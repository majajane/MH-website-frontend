<section class="form-container">

   <form action="" enctype="multipart/form-data" method="POST">
      <h3>Register now</h3>
      <input type="text" name="name" class="box" placeholder="Enter your name" required>
      <input type="email" name="email" class="box" placeholder="Enter your email" required>
      <input type="password" name="pass" id="password" class="box" placeholder="Enter your password" required>
         <div id="strengthMessage" style="margin-top:2px; font-size:11px; text-align:right;"></div>
      <input type="password" name="cpass" class="box" placeholder="Confirm your password" required>
         <div id="matchMessage" style="margin-top: 2px; font-size: 11px; text-align: right;"></div>
      <input type="file" name="image" class="box" required accept="image/jpg, image/jpeg, image/png">
      <input type="submit" value="Register now" class="btn" name="submit">
      <p>Already have an account? <a href="MH_login.html">Login now</a></p>
   </form>

</section>


</body>

<script> 
const password = document.getElementById("password");
const message = document.getElementById("strengthMessage");

password.addEventListener("input", function() {
    const value = password.value;
    let strength = 0;

    if (value.length >= 8) strength++;
    if (/[A-Z]/.test(value)) strength++;
    if (/[a-z]/.test(value)) strength++;
    if (/[0-9]/.test(value)) strength++;
    if (/[^A-Za-z0-9]/.test(value)) strength++;

    if (value.length === 0) {
        message.textContent = "";
    } else if (strength <= 2) {
        message.textContent = "Weak password";
        message.style.color = "#800000"; 
    } else if (strength <= 4) {
        message.textContent = "Medium strength";
        message.style.color = "#b8860b"; 
    } else {
        message.textContent = "Strong password";
        message.style.color = "#0b6623"; 
    }
});


const confirmPassword = document.getElementById("confirmPassword");
const matchMessage = document.getElementById("matchMessage");
const password = document.getElementById("password");

confirmPassword.addEventListener("input", function() {
    if (confirmPassword.value === "") {
        matchMessage.textContent = "";
    } else if (confirmPassword.value === password.value) {
        matchMessage.textContent = "Passwords match";
        matchMessage.style.color = "#0b6623"; 
    } else {
        matchMessage.textContent = "Passwords do not match";
        matchMessage.style.color = "#800000"; 
    }
});


</script>

</html>
