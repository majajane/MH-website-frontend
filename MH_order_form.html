<section class="form-container">
   <form method="POST">
      <h3>Place Your Order</h3>


      <div class="flex">
         <!--facebook link of receiver-->
         <div class="inputBox">
            <span>Facebook Link :</span>
            <input type="url" name="fblink" placeholder="Enter your Facebook profile link" class="box" required>
         </div>

         <!--number of receiver-->
         <div class="inputBox">
            <span>Contact Number :</span>
            <input type="number" name="number" placeholder="Enter your number (eg. 09901236789)" class="box"  pattern="[0-9]{11}" title="11-digit phone number" required>
         </div>
         
          <!--must be in "1-n" or "1-nn" format only where n is a number-->
         <div class="inputBox">
            <span>Batch Code :</span>
            <input type="number" name="batchcode" placeholder="Enter the given batch code (eg. 1-17)" pattern="[0-9]+-[0-9]+" class="box" required>
         </div>

          <!--must be in "dress num n" or "nnn"  format only where n is a number-->
         <div class="inputBox">
            <span>Dress no. :</span>
            <input type="number" name="dressnum" placeholder="Enter the given dress no. (eg. 1920)" class="box" min="1"  required>
         </div>

         <!--number of order-->
         <div class="inputBox">
            <span>Qty :</span>
            <input type="number" name="qty" placeholder="Enter quantity (eg. 20)" class="box" required>
         </div>

         <!--payment method want-->
         <div class="inputBox">
            <span>Payment Method :</span>
            <select name="method" class="box" required>
               <option value="gcash">Gcash</option>
               <option value="bpi">BPI</option>
               <option value="maribank">MariBank</option>
            </select>
         </div>

      <!--where to checkout, we will send checkout link to you-->
          <div class="inputBox">
            <span>Checkout Link :</span>
            <select name="method" class="box" required>
               <option value="shopee">Shopee</option>
               <option value="tiktokshop">Tiktok Shop</option>
               <option value="tiktokshop">Lalamove</option>
               <option value="tiktokshop">Direct J&T</option>
            </select>
         </div>


      <input type="submit" name="order" class="btn" value="Place order">


   </form>


</section>


<script src="script.js"></script>

</body>
</html>
